<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domovina – Bzučárna Dashboard</title>

<style>
body{
  margin:0;
  font-family: "DejaVu Sans", sans-serif;
  background:#0f1115;
  color:#f5f5f5;
}

header{
  padding:20px;
  border-bottom:1px solid #222;
}

h1{
  margin:0;
  font-size:22px;
}

.sub{
  opacity:0.6;
  font-size:14px;
}

.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  padding:20px;
}

.card{
  background:#1a1d24;
  padding:18px;
  border-radius:12px;
}

.card h2{
  font-size:16px;
  margin-bottom:10px;
}

.value{
  font-size:28px;
  font-weight:bold;
}

.footer{
  padding:15px;
  text-align:center;
  opacity:0.5;
}
</style>
</head>

<body>

<header>
<h1>🐝 Domovina Dashboard</h1>
<div class="sub">Bzučárna OS – Daily Control Panel</div>
</header>

<div class="dashboard">

<div class="card">
<h2>Energie</h2>
<div class="value">4 / 5</div>
</div>

<div class="card">
<h2>Fokus</h2>
<div class="value">3 / 5</div>
</div>

<div class="card">
<h2>Stres</h2>
<div class="value">2 / 5</div>
</div>

<div class="card">
<h2>Směr</h2>
<div class="value">JDU DÁL</div>
</div>

<div class="card">
<h2>Režim systému</h2>
<div class="value">WORK</div>
</div>

<div class="card">
<h2>Malý krok dne</h2>
<div>Pokračovat v Manifestu Bzučárny</div>
</div>

</div>

<div class="footer">
Domovina • Bzučárna OS • Daily Mode
</div>

</body>
</html>
